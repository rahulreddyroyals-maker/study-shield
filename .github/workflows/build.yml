name: Build Study Shield Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      # ── THIS IS THE KEY FIX ──────────────────────────────────────────────
      # Download gradlew + wrapper JAR directly from Gradle's servers.
      # This means we NEVER depend on these binary files being in the repo.
      - name: Install Gradle wrapper
        run: |
          cd android-agent

          # Download the gradlew shell script
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" \
            -o gradlew
          chmod +x gradlew

          # Download the wrapper JAR
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          echo "=== Wrapper files ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar
      # ─────────────────────────────────────────────────────────────────────

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-agent/app/google-services.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android-agent/**/*.gradle', 'android-agent/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android-agent

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyShield-debug
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
