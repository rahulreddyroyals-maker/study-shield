name: Build Study Shield Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper
        run: |
          cd android-agent
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" -o gradlew
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "gradlew ready: $(ls -la gradlew)"

      - name: Verify google-services.json matches package
        run: |
          PKG=$(python3 -c "import json; print(json.load(open('android-agent/app/google-services.json'))['client'][0]['client_info']['android_client_info']['package_name'])")
          echo "google-services.json package: $PKG"
          if [ "$PKG" != "com.studyshield.app" ]; then
            echo "::error::Package mismatch! google-services.json has '$PKG' but build.gradle expects 'com.studyshield.app'"
            exit 1
          fi
          echo "Package match confirmed: $PKG"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android-agent/**/*.gradle') }}
          restore-keys: gradle-

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android-agent

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyShield-debug
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
