name: Build Study Shield Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify project structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== android-agent contents ==="
          ls -la android-agent/
          echo "=== gradlew exists? ==="
          ls -la android-agent/gradlew || echo "MISSING gradlew!"
          echo "=== gradle/wrapper ==="
          ls -la android-agent/gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x android-agent/gradlew

      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-agent/app/google-services.json
          echo "google-services.json written"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android-agent

      - name: Verify APK was built
        run: |
          ls -la android-agent/app/build/outputs/apk/debug/
          echo "APK size: $(du -sh android-agent/app/build/outputs/apk/debug/app-debug.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyShield-debug-apk
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

  deploy-web:
    name: Deploy Web App to Firebase
    runs-on: ubuntu-latest
    # Only deploy web if secrets exist
    if: ${{ vars.DEPLOY_WEB == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web-app

      - name: Inject Firebase config
        run: |
          cat > web-app/src/firebaseConfig.js << 'FBEOF'
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };
          FBEOF

      - name: Build React app
        run: npm run build
        working-directory: web-app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: web-app
